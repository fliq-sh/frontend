name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      # `next build` also type-checks (next.config.ts does not ignore TS errors),
      # so a green build covers compile + types in one step.
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.fliq.sh' }}
          # Clerk validates the publishable key *format* at prerender. Prefer the
          # real secret (matches deploy.yml); fall back to a syntactically-valid
          # throwaway key so the build is self-contained when no secret is set.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_ZmFrZS1jaS5jbGVyay5hY2NvdW50cy5kZXYk' }}
        run: npm run build
